<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程学习 — 康波研究院</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#09090b;--bg2:#0f0f13;--bg3:#18181b;
  --card:#1c1c21;--card2:#222228;--card3:#2a2a32;
  --border:#27272a;--border2:#3f3f46;
  --text:#fafafa;--text2:#a1a1aa;--text3:#71717a;
  --gold:#e2b64f;--gold2:#f5d98a;
  --green:#22c55e;--blue:#3b82f6;--purple:#a78bfa;
  --orange:#f59e0b;--red:#ef4444;
  --serif:'Noto Serif SC',serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
a{color:inherit;text-decoration:none}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,11,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:8px}
.nav-logo svg{width:28px;height:28px}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:0.85rem;color:var(--text2);transition:color .2s;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--gold)}

/* PROGRESS BAR */
.progress-bar{position:fixed;top:64px;left:0;right:0;height:3px;background:var(--border);z-index:99}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .5s ease;width:0%}

/* LAYOUT */
.main{max-width:860px;margin:0 auto;padding:88px 24px 80px}

/* HERO */
.learn-hero{text-align:center;padding:20px 0 40px}
.learn-hero .label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:12px}
.learn-hero h1{font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:900;margin-bottom:12px}
.learn-hero h1 .gold{color:var(--gold)}
.learn-hero p{color:var(--text2);font-size:1rem;max-width:560px;margin:0 auto}

/* COURSE MAP */
.course-map{display:flex;flex-direction:column;gap:12px;margin:32px 0}

/* COURSE NODE */
.c-node{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s;position:relative}
.c-node.locked{opacity:0.5;pointer-events:none}
.c-node.current{border-color:var(--gold);box-shadow:0 0 30px rgba(226,182,79,0.08)}
.c-node.completed{border-color:var(--green)}
.c-node-header{display:flex;align-items:center;padding:20px 24px;gap:16px;cursor:pointer;user-select:none}
.c-node.locked .c-node-header{cursor:default}
.c-num{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;flex-shrink:0}
.c-node.locked .c-num{background:var(--card3);color:var(--text3)}
.c-node.current .c-num{background:linear-gradient(135deg,var(--gold),#b8860b);color:#000}
.c-node.completed .c-num{background:var(--green);color:#000}
.c-info{flex:1}
.c-info h3{font-size:1rem;margin-bottom:4px}
.c-info p{font-size:0.82rem;color:var(--text3)}
.c-tags{display:flex;gap:6px;margin-top:6px}
.c-tag{font-size:0.7rem;padding:2px 8px;border-radius:4px;background:var(--card3);color:var(--text3)}
.c-status{font-size:0.8rem;font-weight:600;flex-shrink:0;padding:4px 12px;border-radius:6px}
.c-node.locked .c-status{color:var(--text3)}
.c-node.current .c-status{color:var(--gold);background:rgba(226,182,79,0.1)}
.c-node.completed .c-status{color:var(--green);background:rgba(34,197,94,0.1)}

/* COURSE CONTENT PANEL */
.c-body{display:none;border-top:1px solid var(--border)}
.c-node.open .c-body{display:block}
.c-content{padding:28px 24px;max-height:65vh;overflow-y:auto}
.c-content::-webkit-scrollbar{width:4px}
.c-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* MARKDOWN CONTENT */
.md{color:var(--text2);font-size:0.92rem;line-height:1.85}
.md h1{font-family:var(--serif);font-size:1.6rem;color:var(--text);margin:28px 0 14px;font-weight:700}
.md h2{font-size:1.2rem;color:var(--text);margin:24px 0 10px;font-weight:700;border-bottom:1px solid var(--border);padding-bottom:6px}
.md h3{font-size:1.02rem;color:var(--gold);margin:18px 0 6px;font-weight:600}
.md h4{font-size:0.95rem;color:var(--text);margin:14px 0 6px;font-weight:600}
.md p{margin:8px 0}
.md strong{color:var(--text)}
.md em{color:var(--gold);font-style:italic}
.md blockquote{border-left:3px solid var(--gold);padding:10px 18px;margin:14px 0;background:rgba(226,182,79,0.04);border-radius:0 8px 8px 0}
.md ul,.md ol{padding-left:22px;margin:8px 0}
.md li{margin:4px 0}
.md code{background:var(--card3);padding:1px 5px;border-radius:3px;font-size:0.84rem;color:var(--gold)}
.md pre{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin:14px 0;overflow-x:auto}
.md pre code{background:none;padding:0;color:var(--text2)}
.md table{width:100%;border-collapse:collapse;margin:14px 0;font-size:0.85rem}
.md th{background:var(--card2);color:var(--gold);text-align:left;padding:8px 10px;border:1px solid var(--border);font-weight:600}
.md td{padding:8px 10px;border:1px solid var(--border)}
.md tr:nth-child(even){background:rgba(255,255,255,0.015)}
.md hr{border:none;border-top:1px solid var(--border);margin:20px 0}

/* QUIZ SECTION */
.quiz-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-top:24px}
.quiz-title{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.quiz-title h3{font-size:1.1rem;color:var(--gold)}
.quiz-title .badge{font-size:0.7rem;background:var(--gold);color:#000;padding:2px 10px;border-radius:100px;font-weight:700}

.quiz-q{margin-bottom:24px;padding:20px;background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border)}
.quiz-q.answered-correct{border-color:var(--green);background:rgba(34,197,94,0.03)}
.quiz-q.answered-wrong{border-color:var(--red);background:rgba(239,68,68,0.03)}
.quiz-q-num{font-size:0.75rem;color:var(--text3);font-weight:600;margin-bottom:8px}
.quiz-q-text{font-size:0.95rem;color:var(--text);margin-bottom:14px;font-weight:500}

.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;font-size:0.88rem;color:var(--text2);user-select:none}
.quiz-opt:hover{border-color:var(--border2);color:var(--text);background:var(--card2)}
.quiz-opt.selected{border-color:var(--blue);color:var(--text);background:rgba(59,130,246,0.06)}
.quiz-opt.correct{border-color:var(--green)!important;color:var(--green)!important;background:rgba(34,197,94,0.08)!important}
.quiz-opt.wrong{border-color:var(--red)!important;color:var(--red)!important;background:rgba(239,68,68,0.06)!important}
.quiz-opt.disabled{pointer-events:none}
.quiz-opt-letter{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;transition:all .2s}
.quiz-opt.selected .quiz-opt-letter{border-color:var(--blue);color:var(--blue)}
.quiz-opt.correct .quiz-opt-letter{border-color:var(--green);color:#000;background:var(--green)}
.quiz-opt.wrong .quiz-opt-letter{border-color:var(--red);color:#000;background:var(--red)}

.quiz-explain{display:none;margin-top:12px;padding:12px 16px;border-radius:8px;font-size:0.85rem;line-height:1.7}
.quiz-explain.show{display:block}
.quiz-explain.correct-explain{background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);color:var(--green)}
.quiz-explain.wrong-explain{background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:var(--red)}

/* QUIZ FOOTER */
.quiz-footer{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.quiz-score{font-size:0.9rem;color:var(--text2)}
.quiz-score .num{color:var(--gold);font-weight:700;font-size:1.2rem}
.quiz-actions{display:flex;gap:10px}

/* BUTTONS */
.btn{padding:10px 22px;border-radius:8px;font-weight:600;font-size:0.88rem;border:none;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--gold);color:#000}
.btn-primary:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{background:#16a34a}

/* NEXT COURSE BANNER */
.next-banner{display:none;margin-top:24px;padding:24px;background:linear-gradient(135deg,rgba(34,197,94,0.08),rgba(59,130,246,0.05));border:1px solid rgba(34,197,94,0.2);border-radius:var(--radius);text-align:center}
.next-banner.show{display:block}
.next-banner h4{color:var(--green);margin-bottom:8px}
.next-banner p{color:var(--text2);font-size:0.9rem;margin-bottom:16px}
.next-banner .next-title{color:var(--gold);font-weight:700}

/* STATS BAR */
.stats-bar{display:flex;gap:16px;margin:24px 0;flex-wrap:wrap}
.stat-item{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;text-align:center}
.stat-item .stat-num{font-size:1.6rem;font-weight:800;color:var(--gold)}
.stat-item .stat-label{font-size:0.75rem;color:var(--text3);margin-top:4px}

/* CONFETTI */
.confetti-container{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;top:-10px;animation:confetti-fall 3s ease-in forwards}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* FOOTER */
.footer{border-top:1px solid var(--border);padding:24px 0;text-align:center;margin-top:40px}
.footer p{font-size:0.8rem;color:var(--text3)}

@media(max-width:768px){
  .main{padding:84px 16px 60px}
  .c-node-header{padding:16px;gap:12px}
  .c-num{width:40px;height:40px;font-size:1.1rem}
  .c-content{padding:20px 16px}
  .quiz-section{padding:20px 16px}
  .quiz-footer{flex-direction:column;gap:12px}
  .stats-bar{gap:8px}
  .timeline-container{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .timeline-svg{min-width:700px}
  .seasons-grid{grid-template-columns:1fr 1fr}
  .video-grid{grid-template-columns:1fr}
  .section-title{font-size:1.1rem}
}

/* VISUAL SECTIONS */
.visual-section{margin:32px 0}
.section-title{font-family:var(--serif);font-size:1.25rem;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title .icon{font-size:1.1rem}

/* TIMELINE */
.timeline-container{overflow-x:auto;padding:8px 0 16px;margin-bottom:8px}
.timeline-container::-webkit-scrollbar{height:4px}
.timeline-container::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.timeline-svg{display:block;cursor:default}
.timeline-svg .wave-bar{cursor:pointer;transition:opacity .2s,filter .2s}
.timeline-svg .wave-bar:hover{opacity:1!important;filter:brightness(1.25)}
.timeline-svg text{pointer-events:none;font-family:'Inter',sans-serif}
.timeline-svg .year-label{fill:var(--text3);font-size:11px}
.timeline-svg .wave-label{fill:#fff;font-size:12px;font-weight:700}
.timeline-svg .wave-title{fill:rgba(255,255,255,0.85);font-size:10px}
.timeline-svg .now-marker{fill:var(--gold)}
.timeline-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
.timeline-legend span{font-size:0.75rem;color:var(--text3);display:flex;align-items:center;gap:5px}
.timeline-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:2px}
.tl-phase-spring::before{background:#4ade80}
.tl-phase-summer::before{background:#f59e0b}
.tl-phase-autumn::before{background:#a78bfa}
.tl-phase-winter::before{background:#60a5fa}

/* TOOLTIP */
.wave-tooltip{position:fixed;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;pointer-events:none;z-index:150;max-width:260px;opacity:0;transition:opacity .15s;font-size:0.82rem;line-height:1.6;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.wave-tooltip.show{opacity:1}
.wave-tooltip h4{color:var(--gold);font-size:0.9rem;margin-bottom:4px}
.wave-tooltip p{color:var(--text2)}
.wave-tooltip .tip-phase{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.72rem;font-weight:700;margin-top:4px}

/* SEASONS */
.seasons-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.season-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center;transition:all .25s}
.season-card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,0.3)}
.season-card.spring{border-color:rgba(74,222,128,0.3)}
.season-card.summer{border-color:rgba(245,158,11,0.3)}
.season-card.autumn{border-color:rgba(167,139,250,0.3)}
.season-card.winter{border-color:rgba(96,165,250,0.3)}
.season-icon{font-size:2rem;margin-bottom:8px}
.season-name{font-family:var(--serif);font-size:1.15rem;font-weight:700;margin-bottom:4px}
.season-card.spring .season-name{color:#4ade80}
.season-card.summer .season-name{color:#f59e0b}
.season-card.autumn .season-name{color:#a78bfa}
.season-card.winter .season-name{color:#60a5fa}
.season-sub{font-size:0.82rem;color:var(--text3);margin-bottom:8px}
.season-desc{font-size:0.78rem;color:var(--text2);line-height:1.6}
.season-years{font-size:0.72rem;color:var(--text3);margin-top:8px;font-weight:600}
.season-active{position:relative}
.season-active::after{content:'当前';position:absolute;top:8px;right:8px;font-size:0.65rem;background:var(--gold);color:#000;padding:1px 6px;border-radius:100px;font-weight:700}

/* VIDEO SECTION */
.video-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.video-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;transition:all .25s;text-decoration:none;display:block}
.video-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.video-thumb{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.video-thumb svg{width:48px;height:48px;opacity:0.7}
.video-card:hover .video-thumb svg{opacity:1}
.video-thumb .play-icon{transition:transform .2s}
.video-card:hover .play-icon{transform:scale(1.15)}
.video-info{padding:10px 12px}
.video-info h4{font-size:0.82rem;color:var(--text);margin-bottom:3px;line-height:1.4}
.video-info p{font-size:0.72rem;color:var(--text3)}
.video-tag{position:absolute;top:8px;left:8px;font-size:0.65rem;background:rgba(226,182,79,0.9);color:#000;padding:1px 6px;border-radius:4px;font-weight:700}

/* AUTO-SCROLL HINT */
.scroll-hint{display:flex;align-items:center;gap:8px;padding:10px 16px;background:rgba(226,182,79,0.08);border:1px solid rgba(226,182,79,0.2);border-radius:8px;margin-top:12px;font-size:0.82rem;color:var(--gold);animation:pulse-hint 2s ease-in-out infinite}
@keyframes pulse-hint{0%,100%{opacity:0.8}50%{opacity:1}}
.scroll-hint svg{width:16px;height:16px;flex-shrink:0}
</style>
</style>
</head>

// ============================================================
const COURSES = [

      {

// ============================================================
// STATE
const KEY='kondratiev_learn_v1';
let state=loadState();

function loadState(){
  try{
    const s=localStorage.getItem(KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return {completed:[],scores:{},current:1,totalCorrect:0,streak:0};
}
function saveState(){localStorage.setItem(KEY,JSON.stringify(state));}

// ============================================================
// RENDER
function render(){
  const map=document.getElementById('courseMap');
  map.innerHTML='';
  let totalQ=0,totalA=0;

  COURSES.forEach((c,i)=>{
    const isCompleted=state.completed.includes(c.id);
    const isCurrent=c.id===state.current;
    const isLocked=!isCompleted && !isCurrent;
    const score=state.scores[c.id];
    const hasScore=score!==undefined;

    totalQ+=c.quiz.length;
    if(hasScore) totalA+=score;

    const node=document.createElement('div');
    node.className='c-node'+(isCompleted?' completed':'')+(isCurrent?' current':'')+(isLocked?' locked':'')+(isCurrent&&node.classList.contains('open')?' open':'');
    node.id='course-'+c.id;

    // Header
    const statusText=isCompleted?'✓ 已通过':isLocked?'🔒 未解锁':'▶ 学习中';
    node.innerHTML=`
      <div class="c-node-header" onclick="toggleCourse(${c.id})">
        <div class="c-num">${isCompleted?'✓':c.id}</div>
        <div class="c-info">
          <h3>${c.title}</h3>
          <p>${c.desc}</p>
          <div class="c-tags">${c.tags.map(t=>`<span class="c-tag">${t}</span>`).join('')}${hasScore?`<span class="c-tag" style="color:var(--green)">得分 ${score}/${c.quiz.length}</span>`:''}</div>
        </div>
        <div class="c-status">${statusText}</div>
      </div>
      <div class="c-body">
        <div class="c-content">
          <div class="md" id="md-${c.id}"><p style="color:var(--text3)">加载课程内容中...</p></div>
          ${renderQuiz(c,isCompleted,hasScore)}
        </div>
      </div>
    `;
    map.appendChild(node);

    // Load markdown
    if(!isLocked) loadMd(c);
  });

  // Update stats
  document.getElementById('statCompleted').textContent=state.completed.length;
  document.getElementById('statScore').textContent=state.totalCorrect;
  document.getElementById('statStreak').textContent=state.streak;

  // Progress bar
  const pct=(state.completed.length/COURSES.length)*100;
  document.getElementById('progressFill').style.width=pct+'%';
}

function renderQuiz(c,isCompleted,hasScore){
  if(isCompleted && hasScore){
    return `
      <div class="quiz-section">
        <div class="quiz-title"><h3>随堂测验</h3><span class="badge">得分 ${state.scores[c.id]}/${c.quiz.length}</span></div>
        <p style="color:var(--green);text-align:center;padding:20px">✓ 本课测验已通过</p>
        <div class="quiz-actions" style="justify-content:center;margin-top:12px">
          <button class="btn btn-secondary" onclick="retakeQuiz(${c.id})">重新测验</button>
        </div>
      </div>
    `;
  }

  const letters=['A','B','C','D'];
  let html=`<div class="quiz-section" id="quiz-${c.id}">
    <div class="quiz-title"><h3>随堂测验</h3><span class="badge">答对${Math.ceil(c.quiz.length*0.6)}/${c.quiz.length}通过</span></div>`;

  c.quiz.forEach((q,qi)=>{
    html+=`<div class="quiz-q" id="q-${c.id}-${qi}">
      <div class="quiz-q-num">第${qi+1}题 / 共${c.quiz.length}题</div>
      <div class="quiz-q-text">${q.q}</div>
      <div class="quiz-opts">
        ${q.opts.map((o,oi)=>`
          <div class="quiz-opt" id="opt-${c.id}-${qi}-${oi}" onclick="selectOpt(${c.id},${qi},${oi})">
            <div class="quiz-opt-letter">${letters[oi]}</div>
            <div>${o}</div>
          </div>
        `).join('')}
      </div>
      <div class="quiz-explain" id="exp-${c.id}-${qi}"></div>
    </div>`;
  });

  html+=`<div class="quiz-footer">
      <div class="quiz-score">已答：<span class="num" id="answered-${c.id}">0</span>/${c.quiz.length}</div>
      <div class="quiz-actions">
        <button class="btn btn-primary" id="submitBtn-${c.id}" onclick="submitQuiz(${c.id})" disabled>提交答卷</button>
      </div>
    </div></div>`;
  return html;
}

// ============================================================
// INTERACTIONS
let quizAnswers={}; // {courseId: {qIndex: optIndex}}

function selectOpt(ci,qi,oi){
  const qEl=document.getElementById(`q-${ci}-${qi}`);
  if(qEl.classList.contains('answered-correct')||qEl.classList.contains('answered-wrong')) return;

  if(!quizAnswers[ci]) quizAnswers[ci]={};
  quizAnswers[ci][qi]=oi;

  // Visual selection
  const opts=qEl.querySelectorAll('.quiz-opt');
  opts.forEach((o,i)=>{
    o.classList.toggle('selected',i===oi);
  });

  // Update answered count
  const answered=Object.keys(quizAnswers[ci]).length;
  const answeredEl=document.getElementById('answered-'+ci);
  if(answeredEl) answeredEl.textContent=answered;

  // Enable submit
  const total=COURSES.find(c=>c.id===ci).quiz.length;
  const btn=document.getElementById('submitBtn-'+ci);
  if(btn) btn.disabled=answered<total;
}

function submitQuiz(ci){
  const c=COURSES.find(x=>x.id===ci);
  const answers=quizAnswers[ci]||{};
  let correct=0;

  c.quiz.forEach((q,qi)=>{
    const userAns=answers[qi];
    const qEl=document.getElementById(`q-${ci}-${qi}`);
    const expEl=document.getElementById(`exp-${ci}-${qi}`);
    const opts=qEl.querySelectorAll('.quiz-opt');

    // Disable all options
    opts.forEach(o=>o.classList.add('disabled'));

    if(userAns===q.answer){
      correct++;
      qEl.classList.add('answered-correct');
      opts[userAns].classList.add('correct');
      expEl.className='quiz-explain show correct-explain';
      expEl.innerHTML='✓ 正确 — '+q.explain;
    } else {
      qEl.classList.add('answered-wrong');
      if(userAns!==undefined) opts[userAns].classList.add('wrong');
      opts[q.answer].classList.add('correct');
      expEl.className='quiz-explain show wrong-explain';
      expEl.innerHTML='✗ 正确答案是 '+['A','B','C','D'][q.answer]+' — '+q.explain;
    }
  });

  // Save score
  state.scores[ci]=correct;
  state.totalCorrect=Object.values(state.scores).reduce((a,b)=>a+b,0);

  const passed=correct>=Math.ceil(c.quiz.length*0.6);

  if(passed){
    if(!state.completed.includes(ci)){
      state.completed.push(ci);
      state.streak++;
      // Unlock next
      if(ci<COURSES.length) state.current=ci+1;
    }
    showConfetti();

    // Show next course banner
    const nextC=COURSES.find(x=>x.id===ci+1);
    const banner=document.createElement('div');
    banner.className='next-banner show';
    banner.innerHTML=nextC?
      `<h4>🎉 恭喜通过！</h4>
       <p>你答对了 <strong>${correct}/${c.quiz.length}</strong> 题，下一课已解锁：</p>
       <p class="next-title">第${nextC.id}课：${nextC.title}</p>
       <button class="btn btn-green" onclick="toggleCourse(${nextC.id});window.scrollTo({top:document.getElementById('course-${nextC.id}').offsetTop-80,behavior:'smooth'})">进入下一课 →</button>`
      :
      `<h4>🏆 全部完成！</h4>
       <p>你答对了 <strong>${correct}/${c.quiz.length}</strong> 题，已完成全部6课！</p>
       <p style="color:var(--gold);font-weight:700;font-size:1.1rem;margin-top:8px">恭喜获得「康波分析师」认证</p>`;
    document.getElementById('quiz-'+ci).after(banner);
  }

  // Update submit button
  const btn=document.getElementById('submitBtn-'+ci);
  if(btn){
    btn.outerHTML=passed?
      `<span style="color:var(--green);font-weight:700">✓ 通过 (${correct}/${c.quiz.length})</span>`
      :
      `<button class="btn btn-secondary" onclick="retakeQuiz(${ci})">未通过 (${correct}/${c.quiz.length})，重试</button>`;
  }

  saveState();
  updateStats();
}

function retakeQuiz(ci){
  delete quizAnswers[ci];
  delete state.scores[ci];
  state.completed=state.completed.filter(x=>x!==ci);
  if(state.current>ci) state.current=ci;
  saveState();
  render();
  setTimeout(()=>toggleCourse(ci),100);
}

function toggleCourse(id){
  const node=document.getElementById('course-'+id);
  if(!node||node.classList.contains('locked')) return;
  const wasOpen=node.classList.contains('open');
  document.querySelectorAll('.c-node').forEach(n=>n.classList.remove('open'));
  if(!wasOpen){
    node.classList.add('open');
    setTimeout(()=>node.scrollIntoView({behavior:'smooth',block:'start'}),50);
  }
}

function updateStats(){
  document.getElementById('statCompleted').textContent=state.completed.length;
  document.getElementById('statScore').textContent=state.totalCorrect;
  document.getElementById('statStreak').textContent=state.streak;
  document.getElementById('progressFill').style.width=(state.completed.length/COURSES.length*100)+'%';
}

// ============================================================
// MARKDOWN LOADER
function parseMd(md){
  return md
    .replace(/^# .+\n/,'')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^#### (.+)$/gm,'<h4>$1</h4>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/```[\s\S]*?```/g,m=>'<pre><code>'+m.replace(/```\w*\n?/,'').replace(/```$/,'').trim()+'</code></pre>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/<p><\/p>/g,'')
    .replace(/<p>(<h[234]>)/g,'$1').replace(/(<\/h[234]>)<\/p>/g,'$1')
    .replace(/<p>(<blockquote>)/g,'$1').replace(/(<\/blockquote>)<\/p>/g,'$1')
    .replace(/<p>(<pre>)/g,'$1').replace(/(<\/pre>)<\/p>/g,'$1')
    .replace(/<p>(<hr>)<\/p>/g,'$1')
    .replace(/<p><li>/g,'<ul><li>').replace(/<\/li><\/p>/g,'</li></ul>')
    .replace(/<\/ul><ul>/g,'');
}

function loadMd(c){
  fetch(c.file)
    .then(r=>r.text())
    .then(md=>{
      const el=document.getElementById('md-'+c.id);
      if(el) el.innerHTML=parseMd(md);
    })
    .catch(()=>{
      const el=document.getElementById('md-'+c.id);
      if(el) el.innerHTML='<p style="color:var(--text3)">课程内容加载失败，请刷新重试。</p>';
    });
}

// ============================================================
// CONFETTI
function showConfetti(){
  const box=document.getElementById('confettiBox');
  const colors=['#e2b64f','#22c55e','#3b82f6','#a78bfa','#f59e0b','#ef4444'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti';
    el.style.left=Math.random()*100+'%';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDelay=Math.random()*2+'s';
    el.style.animationDuration=(2+Math.random()*2)+'s';
    box.appendChild(el);
  }
  setTimeout(()=>box.innerHTML='',4000);
}

  setTimeout(()=>{
    const node=document.getElementById('course-'+state.current);
    if(node){
      node.classList.add('open');
    }
  },300);
}
