<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>康波工具 — 康波研究院</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--bg2:#0f0f13;--card:#1c1c21;--card2:#222228;--card3:#2a2a32;--border:#27272a;--border2:#3f3f46;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--gold:#e2b64f;--gold2:#f5d98a;--green:#22c55e;--blue:#3b82f6;--purple:#a78bfa;--orange:#f59e0b;--red:#ef4444;--serif:'Noto Serif SC',serif;--sans:'Inter',sans-serif;--radius:16px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7}
a{color:var(--gold);text-decoration:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,11,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--gold)}
.nav-back{font-size:0.85rem;color:var(--text3)}
.container{max-width:900px;margin:0 auto;padding:80px 24px 60px}
h1{font-family:var(--serif);font-size:2rem;font-weight:900;margin-bottom:8px}
.subtitle{color:var(--text2);margin-bottom:40px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:24px}
.card h2{font-size:1.25rem;color:var(--gold);margin-bottom:16px}
select{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:12px 16px;border-radius:10px;font-size:0.95rem;width:100%;margin-bottom:12px;appearance:none;font-family:var(--sans)}
input[type=range]{width:100%;accent-color:var(--gold);height:6px;margin:8px 0}
.age-label{display:flex;justify-content:space-between;font-size:0.9rem;margin-bottom:4px}
.age-val{color:var(--gold);font-weight:700;font-size:1.3rem}
.timeline-vis{position:relative;height:44px;background:var(--card2);border-radius:10px;margin:16px 0;overflow:hidden}
.timeline-vis .marker{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:600;color:#fff}
.timeline-vis .you{position:absolute;top:-2px;width:3px;height:calc(100% + 4px);background:var(--gold);z-index:2}
.timeline-vis .you::after{content:'你';position:absolute;top:-18px;left:50%;transform:translateX(-50%);color:var(--gold);font-size:0.7rem;font-weight:700}
.opp-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--card2);border-radius:10px;margin-bottom:8px}
.opp-year{font-weight:700;color:var(--green);min-width:70px;font-size:0.9rem}
.opp-desc{font-size:0.85rem;color:var(--text2)}
.strategy-box{padding:16px;border-radius:10px;margin-top:16px}
.strategy-box .label{font-size:0.8rem;color:var(--text3)}
.strategy-box .name{font-size:1.15rem;font-weight:700;margin:4px 0}
.strategy-box .detail{font-size:0.85rem;color:var(--text2)}
.asset-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:12px}
.asset-item{padding:12px;border-radius:10px;border:1px solid var(--border);font-size:0.9rem}
.asset-best{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3)}
.asset-good{background:rgba(245,158,11,0.08);border-color:rgba(245,158,11,0.3)}
.asset-avoid{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3)}
.asset-label{font-size:0.75rem;font-weight:600;margin-bottom:6px}
.lg{color:var(--green)}.ly{color:var(--orange)}.lr{color:var(--red)}
.radar-wrap{display:flex;justify-content:center;margin:20px 0}
.score-big{text-align:center;font-size:2.5rem;font-weight:900;margin:10px 0}
.score-text{text-align:center;color:var(--text2);font-size:0.9rem;margin-bottom:16px}
.dim-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;margin-bottom:16px}
.dim-box{background:var(--card2);padding:12px;border-radius:10px}
.dim-box .dim-name{font-size:0.75rem;color:var(--text3)}
.dim-box .dim-score{font-size:1.4rem;font-weight:700;margin:4px 0}
.dim-box .dim-label{font-size:0.65rem;color:var(--text3)}
.analysis{background:var(--card2);padding:16px;border-radius:10px;font-size:0.9rem;color:var(--text2);line-height:1.7;border-left:3px solid var(--gold)}
.quote-sm{text-align:center;padding:40px 0;font-family:var(--serif);font-size:1.1rem;color:var(--text3);font-style:italic}
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><a href="index.html" class="nav-logo">← 康波研究院</a><span class="nav-back">互动工具</span></div></nav>
<div class="container">
<h1>康波投资工具箱</h1>
<p class="subtitle">输入你的信息，获得个性化的周期定位和投资建议</p>

<!-- 工具1: 康波计算器 -->
<div class="card" id="calculator">
  <h2>康波计算器 — 你的人生时间表</h2>
  <div class="age-label"><span>你的年龄</span><span class="age-val" id="ageVal">35</span></div>
  <input type="range" min="20" max="60" value="35" id="ageSlider" oninput="updateAge()">
  <div class="timeline-vis" id="ageTimeline"></div>
  <div id="ageResult"></div>
</div>

<div class="quote-sm">"人生发财靠康波" — 周金涛</div>

<!-- 工具2: 资产轮动 -->
<div class="card" id="assets">
  <h2>资产轮动查询器</h2>
  <select id="phaseSelect" onchange="updateAssets()">
    <option value="depression_late">萧条末期（当前 · 2026）</option>
    <option value="recovery">回升期（2026-2038）</option>
    <option value="prosperity">繁荣期（2038-2055）</option>
    <option value="recession">衰退期</option>
    <option value="depression_early">萧条早期</option>
  </select>
  <div id="assetResult"></div>
</div>

<!-- 工具3: 三维评分 -->
<div class="card" id="radar">
  <h2>三维共振投资评分</h2>
  <select id="investSelect" onchange="updateScore()">
    <option value="黄金">黄金</option><option value="白银">白银</option>
    <option value="AI算力">AI算力</option><option value="核电">核电</option>
    <option value="小金属">小金属</option><option value="美股">美股</option>
    <option value="加密货币">加密货币</option><option value="房地产">房地产</option>
    <option value="A股">A股</option><option value="大宗商品">大宗商品</option>
  </select>
  <div class="radar-wrap"><canvas id="radarCanvas" width="300" height="300"></canvas></div>
  <div id="scoreDisplay"></div>
</div>
</div>

<script>
const scores={
  '黄金':{z:5,s:5,t:5,msg:'三重共振最高确定性。康波萧条期最佳资产+去美元化趋势+货币重置核心锚。'},
  '白银':{z:4,s:5,t:4,msg:'新能源工业属性加持，金银比修复空间大。回升期弹性可能超过黄金。'},
  'AI算力':{z:5,s:5,t:3,msg:'第六轮康波核心基建，类似第五轮的"买芯片"。确定性极高。'},
  '核电':{z:4,s:5,t:3,msg:'AI用电量暴增+碳中和双驱动，核电回归确定性高。'},
  '小金属':{z:4,s:5,t:5,msg:'镓锗锑稀土是AI+新能源的"维生素"，供给高度集中且刚性。'},
  '美股':{z:4,s:4,t:2,msg:'AI革命主战场，但美元信用衰减+估值泡沫风险。'},
  '加密货币':{z:3,s:3,t:4,msg:'去中心化货币实验，高风险高回报。'},
  '房地产':{z:2,s:2,t:2,msg:'康波下行+调整期，仅一线城市核心地段可配置。'},
  'A股':{z:3,s:3,t:3,msg:'国产替代+AI概念有机会，结构性机会大于整体机会。'},
  '大宗商品':{z:4,s:4,t:4,msg:'资源超级牛市逻辑成立，需区分品种。'}
};
const assets={
  depression_late:{best:['核心资产（底部买入）','黄金','白银'],good:['股票（逢低布局）','AI算力','小金属'],avoid:['过度持有现金','高杠杆资产','长期债券']},
  recovery:{best:['股票（成长股）','AI算力','大宗商品'],good:['核心城市房产','核电','小金属'],avoid:['现金（通胀侵蚀）','长期债券']},
  prosperity:{best:['房地产','实物资产'],good:['股票','消费类'],avoid:['债券','现金']},
  recession:{best:['黄金','大宗商品'],good:['现金'],avoid:['股票','房地产']},
  depression_early:{best:['现金','国债'],good:['黄金'],avoid:['股票','房地产','大宗商品']}
};

function updateAge(){
  const age=parseInt(document.getElementById('ageSlider').value);
  document.getElementById('ageVal').textContent=age;
  const tl=document.getElementById('ageTimeline');
  const phases=[{label:'五轮萧条',start:2019,end:2030,color:'#1e3a5f'},{label:'六轮回升',start:2025,end:2038,color:'#065f46'},{label:'六轮繁荣',start:2038,end:2055,color:'#92400e'}];
  const tS=2019,tE=2060;
  tl.innerHTML=phases.map(p=>`<div class="marker" style="left:${(p.start-tS)/(tE-tS)*100}%;width:${(p.end-p.start)/(tE-tS)*100}%;background:${p.color}">${p.label}</div>`).join('')+`<div class="you" style="left:${(2026-tS)/(tE-tS)*100}%"></div>`;
  const opps=[];
  opps.push({year:'2026-28',desc:'播种期定投——AI算力+黄金+小金属，低成本建仓',status:age>=25?'现在就做':'还早'});
  if(age<=45)opps.push({year:'2029-30',desc:'第三次财富机会（周金涛预测）——核心资产建仓',status:'最关键'});
  if(age<=50)opps.push({year:'2032-38',desc:'AI应用全面渗透——机器人+产业AI',status:'高回报期'});
  if(age<=55)opps.push({year:'2038-45',desc:'第六轮繁荣启动——减持成长股，加仓实物',status:'收获期'});
  const s=age<=30?'进攻型：60%权益+20%实物+15%现金+5%探索':age<=40?'平衡型：50%权益+25%实物+20%固收+5%现金':age<=50?'稳健型：35%权益+30%固收+20%实物+15%现金':'防守型：40%固收+30%权益+20%实物+10%现金';
  const[sname,sdetail]=s.split('：');
  const sc=age<=35?'var(--green)':age<=45?'var(--orange)':'var(--blue)';
  document.getElementById('ageResult').innerHTML=`
    <div class="strategy-box" style="background:${sc}15;border:1px solid ${sc}40">
      <div class="label">你的投资策略</div>
      <div class="name" style="color:${sc}">${sname}</div>
      <div class="detail">${sdetail}</div>
    </div>
    <div style="margin-top:20px;font-weight:600;margin-bottom:10px">你的财富机会窗口</div>
    ${opps.map(o=>`<div class="opp-item"><div class="opp-year">${o.year}</div><div class="opp-desc">${o.desc} <span style="color:var(--gold)">[${o.status}]</span></div></div>`).join('')}
  `;
}

function updateAssets(){
  const d=assets[document.getElementById('phaseSelect').value];
  const el=document.getElementById('assetResult');
  const labels=[['最佳资产','lg','asset-best'],['可配置','ly','asset-good'],['应避免','lr','asset-avoid']];
  const keys=['best','good','avoid'];
  el.innerHTML=keys.map((k,i)=>`<div style="margin-top:16px"><div class="asset-label ${labels[i][1]}">${labels[i][0]}</div><div class="asset-grid">${d[k].map(a=>`<div class="asset-item ${labels[i][2]}">${a}</div>`).join('')}</div></div>`).join('');
}

function drawRadar(z,s,t){
  const c=document.getElementById('radarCanvas'),ctx=c.getContext('2d'),cx=150,cy=150,r=110;
  ctx.clearRect(0,0,300,300);
  const angles=[-Math.PI/2,Math.PI/6,5*Math.PI/6],vals=[z/5,s/5,t/5];
  for(let lv=1;lv<=5;lv++){ctx.beginPath();const lr=r*lv/5;angles.forEach((a,i)=>{const x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.closePath();ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.stroke()}
  angles.forEach(a=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.stroke()});
  ctx.beginPath();const pts=angles.map((a,i)=>({x:cx+r*vals[i]*Math.cos(a),y:cy+r*vals[i]*Math.sin(a)}));pts.forEach((p,i)=>{i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)});ctx.closePath();ctx.fillStyle='rgba(226,182,79,0.2)';ctx.fill();ctx.strokeStyle='#e2b64f';ctx.lineWidth=2;ctx.stroke();
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#e2b64f';ctx.fill()});
  const labels=['周金涛(周期)','时寒冰(趋势)','宋鸿兵(货币)'];
  angles.forEach((a,i)=>{const lx=cx+(r+22)*Math.cos(a),ly=cy+(r+22)*Math.sin(a);ctx.fillStyle='#a1a1aa';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(labels[i],lx,ly)});
}

function updateScore(){
  const name=document.getElementById('investSelect').value,d=scores[name];
  const avg=((d.z+d.s+d.t)/3).toFixed(1);
  drawRadar(d.z,d.s,d.t);
  const color=avg>=4.5?'var(--green)':avg>=3.5?'var(--gold)':avg>=2.5?'var(--orange)':'var(--red)';
  document.getElementById('scoreDisplay').innerHTML=`
    <div class="score-big" style="color:${color}">${avg}<span style="font-size:0.35em;color:var(--text3)">/5.0</span></div>
    <div class="score-text">综合确定性评分</div>
    <div class="dim-grid">
      <div class="dim-box"><div class="dim-name">周金涛</div><div class="dim-score" style="color:var(--green)">${d.z}</div><div class="dim-label">周期定位</div></div>
      <div class="dim-box"><div class="dim-name">时寒冰</div><div class="dim-score" style="color:var(--orange)">${d.s}</div><div class="dim-label">趋势方向</div></div>
      <div class="dim-box"><div class="dim-name">宋鸿兵</div><div class="dim-score" style="color:var(--blue)">${d.t}</div><div class="dim-label">货币环境</div></div>
    </div>
    <div class="analysis"><b>三维分析：</b>${d.msg}</div>
  `;
}

document.addEventListener('DOMContentLoaded',()=>{updateAge();updateAssets();updateScore()});
</script>
</body>
</html>
