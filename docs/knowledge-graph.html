<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识图谱 — 康波研究院</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--bg2:#0f0f13;--card:#1c1c21;--card2:#222228;--border:#27272a;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--gold:#e2b64f;--gold2:#f5d98a;--green:#22c55e;--blue:#3b82f6;--purple:#a78bfa;--orange:#f59e0b;--red:#ef4444;--pink:#ec4899;--teal:#14b8a6;--serif:'Noto Serif SC',serif;--sans:'Inter',sans-serif;--radius:16px}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.7}
a{color:var(--gold);text-decoration:none}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(9,9,11,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center}
.nav-inner{max-width:1200px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--gold)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-size:0.85rem;color:var(--text2);transition:color .2s}.nav-links a:hover{color:var(--gold)}

.hero{text-align:center;padding:100px 24px 40px;max-width:800px;margin:0 auto}
.hero .label{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:12px}
.hero h1{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:900;margin-bottom:12px}
.hero h1 .gold{color:var(--gold)}
.hero p{color:var(--text2);font-size:1rem;max-width:600px;margin:0 auto}

.container{max-width:1200px;margin:0 auto;padding:0 24px}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:24px 0 40px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text2)}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* Knowledge Map */
.knowledge-map{position:relative;padding:20px 0}
.phase-row{margin-bottom:32px}
.phase-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:0 8px}
.phase-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.phase-info h3{font-size:1rem;font-weight:700;color:var(--text);font-family:var(--serif)}
.phase-info p{font-size:0.8rem;color:var(--text3)}

.course-flow{display:flex;flex-wrap:wrap;gap:8px;padding:0 8px 0 60px;position:relative}
.course-flow::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:var(--border)}

.course-node{position:relative;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s;min-width:180px;max-width:280px}
.course-node:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
.course-node::before{content:'';position:absolute;left:-24px;top:50%;width:16px;height:2px;background:var(--border)}
.course-node .num{font-size:0.7rem;font-weight:700;color:var(--text3);margin-bottom:4px}
.course-node .title{font-size:0.85rem;font-weight:600;color:var(--text);margin-bottom:4px}
.course-node .tags{display:flex;flex-wrap:wrap;gap:4px}
.course-node .tag{font-size:0.65rem;padding:1px 6px;border-radius:4px;background:rgba(226,182,79,0.1);color:var(--gold)}
.course-node .core{font-size:0.75rem;color:var(--text3);margin-top:4px;line-height:1.4}

/* Difficulty dots */
.diff{display:flex;gap:2px;margin-top:4px}
.diff-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.diff-dot.active{background:var(--gold)}

/* Connection lines */
.connections{margin:40px 0}
.conn-title{font-family:var(--serif);font-size:1.2rem;color:var(--gold);margin-bottom:16px;text-align:center}

/* Learning paths */
.paths{margin:60px 0}
.path-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;transition:border-color .2s}
.path-card:hover{border-color:var(--gold)}
.path-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.path-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.path-name{font-size:1.05rem;font-weight:700}
.path-desc{font-size:0.85rem;color:var(--text2);margin-bottom:12px}
.path-courses{display:flex;flex-wrap:wrap;gap:6px}
.path-course{font-size:0.75rem;padding:4px 10px;border-radius:6px;background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.path-course:hover{border-color:var(--gold);color:var(--gold)}
.path-meta{display:flex;gap:16px;margin-top:12px;font-size:0.8rem;color:var(--text3)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:40px 0}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.stat-num{font-size:2rem;font-weight:900;color:var(--gold);font-family:var(--serif)}
.stat-label{font-size:0.8rem;color:var(--text3);margin-top:4px}

/* Footer */
.footer{text-align:center;padding:40px 24px;border-top:1px solid var(--border);margin-top:60px;font-size:0.8rem;color:var(--text3)}

/* Responsive */
@media(max-width:768px){
  .course-flow{padding:0 8px 0 40px}
  .course-flow::before{left:16px}
  .course-node{min-width:140px}
  .course-node::before{left:-16px;width:8px}
  .legend{gap:8px}
}
</style>
</head>
<body>

// Render legend

// Render knowledge map
function renderMap() {
  const el = document.getElementById('knowledgeMap');
  el.innerHTML = phases.map(p => `
    <div class="phase-row">
      <div class="phase-header">

      <div class="course-flow">

          const c = courses[id];
          const diffDots = [1,2,3].map(i => `<div class="diff-dot${i<=c.d?' active':''}"></div>`).join('');

            <a href="courses.html#course-${id}" class="course-node" style="border-left:3px solid ${p.color}">

}

// Init
